name: Weekly Startup Scraper

on:
  schedule:
    - cron: "0 1 * * 5"   # 每週五 UTC 01:00 = 台灣時間 09:00
  workflow_dispatch:       # 手動觸發

permissions:
  contents: write   # 跑完要把 dashboard.html / weekly_report_*.html commit 回 repo

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full pipeline (scrape → AI score → report → email → dashboard)
        env:
          CEREBRAS_API_KEY:         ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_PROJECT_ID:      ${{ secrets.FIREBASE_PROJECT_ID }}
          SHEETS_ID:                ${{ secrets.SHEETS_ID }}
          GOOGLE_CREDENTIALS_JSON:  ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          EMAIL_SENDER:             ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:           ${{ secrets.EMAIL_PASSWORD }}
          REPORT_RECIPIENTS:        ${{ secrets.REPORT_RECIPIENTS }}
        run: python main.py all --email
        # 沒裝 Ollama，所以本機 Qwen 備援用不到——main.py 會偵測到 Ollama 不在，
        # 自動改成只靠 Cerebras/Gemini 跑完，遇到額度用完會自動重試（開新 process 讓額度旗標重置）。

      - name: Commit and push weekly artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard.html weekly_report_*.html
          git diff --cached --quiet || git commit -m "chore: automated weekly report $(date -u +%Y-%m-%d)"
          git push
